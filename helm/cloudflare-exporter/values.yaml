  #   rules:
  #     - alert: CloudflareExporterDown
  #       expr: up{job="cloudflare-prometheus-exporter"} == 0
  #       for: 5m
  #       labels:
  #         severity: critical
  #       annotations:
  #         summary: "Cloudflare exporter is down"
